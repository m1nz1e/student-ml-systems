name: CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.10"
  DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/student-ml-systems
  DOCKER_BUILDKIT: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Code Quality Checks
  # ─────────────────────────────────────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install scikit-survival  # Extra for survival models

      - name: Install linting tools
        run: pip install black flake8 mypy isort

      - name: Check code formatting (Black)
        run: black src/ ui/ --check --diff

      - name: Check import order (isort)
        run: isort src/ ui/ --check-only --diff

      - name: Lint with Flake8
        run: flake8 src/ ui/ --max-line-length=100 --ignore=E501,W503,E203

      - name: Type check with MyPy
        run: mypy src/ --ignore-missing-imports --warn-unused-configs

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Unit & Integration Tests
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install scikit-survival pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=60 \
            --ignore=tests/e2e \
            --ignore=tests/integration

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Build Docker Image
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=long

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container health check
        run: |
          docker run -d --name test-app -p 8501:8501 \
            -e DATABASE_URL=postgresql://test:test@localhost:5432/test \
            ${{ env.DOCKER_IMAGE }}:latest
          sleep 5
          docker logs test-app
          docker stop test-app

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Deploy to Render (optional)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://student-ml.onrender.com
    steps:
      - name: Deploy via Render API
        uses: render/render-deploy-action@v1
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}
          wait-for-success: true
          success-url: https://student-ml.onrender.com

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: MLflow Experiment Tracking (on main push)
  # ─────────────────────────────────────────────────────────────────────────────
  mlflow-register:
    name: MLflow Model Registry
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install scikit-survival mlflow

      - name: Register best model in MLflow
        run: |
          python -c "
          from src.mlops.mlflow_config import MLflowTracker
          from src.models.early_warning import LSTMEarlyWarning, SurvivalAnalyzer
          import torch, numpy as np

          tracker = MLflowTracker(
            tracking_uri='${{ secrets.MLFLOW_TRACKING_URI }}',
            experiment_name='early-warning-production'
          )

          # Log model metadata
          tracker.log_params({
            'lstm_hidden_dim': 64,
            'lstm_n_layers': 2,
            'dropout': 0.3,
          })

          print('Model metadata logged to MLflow registry')
          "
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
